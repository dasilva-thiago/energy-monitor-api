<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body onload="brython()">

<h2>Energy Consumption Monitor</h2>

<select id="sector">
    <option value="industrial">Industrial</option>
    <option value="comercial">Commercial</option>
    <option value="residencial">Residential</option>
</select>

<button id="btn">Search</button>

<pre id="output"></pre>

<script type="text/python">
from browser import document, ajax, html
import json

def search(ev):
    sector = document["sector"].value
    req = ajax.ajax()
    req.open("GET", f"http://127.0.0.1:8000/consumption/{sector}", True)

    def complete(req):
        data = json.loads(req.text)
        output = document["output"]
        output.clear()

        card = html.DIV(Class="card")

        def stat_row(label, value):
            row = html.DIV(Class="stat")
            row <= html.SPAN(label, Class="stat-label")
            row <= html.SPAN(value, Class="stat-value")
            return row

        card <= stat_row("Sector", data["sector"])
        card <= stat_row("Average", f"{data['average']} kWh")
        card <= stat_row("Peak", f"{data['peak']} kWh")
        card <= stat_row("Minimum", f"{data['minimum']} kWh")
        card <= stat_row("Total readings", data["total_records"])

        grid = html.DIV(Class="values-grid")
        for val in data["values"]:
            grid <= html.SPAN(val, Class="value-chip")

        card <= html.P("All readings:", style="margin: 12px 0 4px; color: #555;")
        card <= grid
        output <= card

    req.bind("complete", complete)
    req.send()

document["btn"].bind("click", search)
</script>

</body>
</html>
